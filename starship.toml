command_timeout = 500

format = """
[](peach)$directory[](fg:peach bg:yellow)$git_branch$git_status[](fg:yellow bg:green)$c$rust$golang$nodejs$php$java$kotlin$haskell$python[](fg:green bg:sapphire)$conda$docker_context[](fg:sapphire)
$character"""

right_format = """$status$cmd_duration"""

palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
purple = "#d000ffff"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[directory]
style = "bg:peach fg:crust"
fish_style_pwd_dir_length = 1
format = '[ $path](fg:crust bg:peach)[$read_only](bg:peach)'
truncation_length = 3
truncation_symbol = "~/"
read_only = ' 🔒'
read_only_style = 'bg:peach'

[git_branch]
symbol = " "
format = '[$symbol$branch](fg:crust bg:yellow)'

[git_status]
format = '[( $all_status$ahead_behind)](fg:crust bg:yellow)'
diverged = '⇕'
ahead = '⇡${count}'
behind = '⇣${count}'
conflicted = '=${count}'
deleted = "\uF068${count}"
modified = "\uF040${count}"
renamed = '»${count}'
staged = "\uF067${count}"
stashed = ''
untracked = "\uF128${count}"

[c]
symbol = " "
format = '[$symbol$version](fg:crust bg:green)'

[rust]
symbol = " "
format = '[$symbol$version](fg:crust bg:green)'

[golang]
symbol = " "
format = '[$symbol$version](fg:crust bg:green)'

[nodejs]
symbol = " "
format = '[$symbol$version](fg:crust bg:green)'

[php]
symbol = " "
format = '[$symbol$version](fg:crust bg:green)'

[java]
symbol = " "
format = '[$symbol$version](fg:crust bg:green)'

[kotlin]
symbol = " "
format = '[$symbol$version](fg:crust bg:green)'

[haskell]
symbol = " "
format = '[$symbol$version](fg:crust bg:green)'

[python]
symbol = " "
format = '[$symbol$version( $virtualenv)](fg:crust bg:green)'

[conda]
format = '[$symbol$environment](fg:crust bg:sapphire)'

[docker_context]
symbol = " "
format = '[$symbol](fg:crust bg:sapphire)'

[status]
format = '[](red)[$symbol$status( \($signal_name\))( 0x$hex_status)](fg:crust bg:red)[](fg:red)'
symbol = '✗'
disabled = false

[cmd_duration]
show_milliseconds = true
format = '[](mauve)[ $duration ](bold fg:crust bg:mauve)[](fg:mauve)'
disabled = false

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[✘](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:green)'
